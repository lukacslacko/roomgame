<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Roomgame · Depth scatter</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <link rel="stylesheet" href="styles.css">
  <style>
    html, body.viewer { height: 100vh; max-height: 100vh; overflow: hidden; }
    body.viewer { display: flex; flex-direction: column; }
    .toolbar {
      display: flex; gap: 0.6rem; align-items: center; flex-wrap: wrap;
      padding: 0.55rem 1rem; background: #111; border-bottom: 1px solid #222;
      font-size: 0.9rem;
    }
    .toolbar button {
      background: #2563eb; color: white; border: 0; border-radius: 0.4rem;
      padding: 0.35rem 0.75rem; font-size: 0.85rem; cursor: pointer;
    }
    .toolbar button.secondary {
      background: #1f1f24; color: #d8e1ff; border: 1px solid #353541;
    }
    .toolbar button:disabled { background: #333; color: #888; cursor: not-allowed; }
    .toolbar select, .toolbar input[type="number"] {
      background: #1f1f24; color: #d8e1ff; border: 1px solid #353541;
      border-radius: 0.3rem; padding: 0.25rem 0.4rem; font-size: 0.85rem;
      font-family: inherit;
    }
    .toolbar label { opacity: 0.7; font-size: 0.82rem; }
    .toolbar .spacer { flex: 1; }
    .toolbar .stat { opacity: 0.85; font-variant-numeric: tabular-nums; }
    .toolbar .stat b { color: #6ec4ff; font-weight: 600; }
    .toolbar fieldset {
      display: inline-flex; gap: 0.5rem; align-items: center;
      border: 1px solid #353541; border-radius: 0.4rem;
      padding: 0.25rem 0.6rem; margin: 0;
      background: #14141c;
    }
    .toolbar fieldset legend {
      padding: 0 0.3rem; opacity: 0.65; font-size: 0.78rem;
    }
    .toolbar fieldset label {
      display: inline-flex; gap: 0.25rem; align-items: center;
      cursor: pointer; opacity: 0.95;
    }
    .toolbar fieldset input[type="radio"] { accent-color: #6ec4ff; }

    .main-row { display: flex; flex-direction: row; flex: 1 1 0; min-height: 0; }
    /* Thumb strip — clicking a thumb selects that frame. */
    #thumbsPanel {
      width: 200px; flex: 0 0 200px;
      overflow-y: auto; overflow-x: hidden;
      background: #0c0c10; border-right: 1px solid #222;
      font-size: 0.8rem;
      padding: 0.3rem;
    }
    #thumbsPanel .thumb-item {
      position: relative;
      margin-bottom: 0.3rem;
      cursor: pointer;
      border: 2px solid transparent;
      border-radius: 0.25rem;
    }
    #thumbsPanel .thumb-item img {
      width: 100%; height: auto; display: block;
      border-radius: 0.2rem;
      background: #111;
    }
    #thumbsPanel .thumb-item.selected { border-color: #6ec4ff; }
    #thumbsPanel .thumb-item:hover { background: #14141c; }
    #thumbsPanel .thumb-item .idx-tag {
      position: absolute; right: 4px; bottom: 4px;
      background: rgba(0,0,0,0.7); color: #d8e1ff;
      padding: 0 0.3rem; border-radius: 0.2rem;
      font-size: 0.7rem; font-variant-numeric: tabular-nums;
      pointer-events: none;
    }

    /* Two-row 4-column grid: row 1 has the four image panels (RGB,
       phone, model, blend), row 2 has the two scatters under the model
       and blend columns (RGB and phone columns leave row 2 empty). The
       scatter row's height clamps so the images don't get squashed on
       small screens but the scatters stay roughly square on big ones. */
    #content-area {
      flex: 1 1 0; min-width: 0;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr 1fr;
      grid-template-rows: minmax(0, 1fr) clamp(180px, 32vh, 360px);
      gap: 6px;
      padding: 6px;
      background: #07070b;
      min-height: 0;
      overflow: hidden;
    }
    .panel {
      position: relative;
      background: #14141c;
      border: 2px solid #222;
      border-radius: 0.4rem;
      overflow: hidden;
      display: flex; align-items: center; justify-content: center;
      min-width: 0; min-height: 0;
    }
    /* Image panels live in row 1; widths come from the grid track,
       heights from the row track. The inner <img> uses object-fit:
       contain so the captured portrait is letterboxed within the
       cell rather than stretched. */
    .panel.image-panel {
      grid-row: 1;
    }
    .panel.scatter {
      grid-row: 2;
    }
    /* The two scatters appear under columns 3 (model) and 4 (blend);
       columns 1 and 2 stay empty in row 2. */
    #panelScatterModel { grid-column: 3; }
    #panelScatterBlend { grid-column: 4; }
    .panel .panel-tag {
      position: absolute; left: 8px; top: 8px;
      background: rgba(0,0,0,0.65); color: #d8e1ff;
      padding: 0.15rem 0.5rem;
      font-weight: 600; border-radius: 0.3rem;
      font-size: 0.78rem;
      pointer-events: none;
      z-index: 5;
    }
    .panel .panel-img-wrap {
      position: relative;
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
    }
    .panel img.depth-img {
      max-width: 100%; max-height: 100%;
      object-fit: contain;
      display: block;
      user-select: none;
      -webkit-user-drag: none;
    }
    /* The RGB panel hosts up to two stacked images: the colour photo plus
       an optional depth/diff overlay layered on top with reduced opacity. */
    .panel.rgb img.overlay-img {
      position: absolute;
      left: 0; top: 0;
      width: 100%; height: 100%;
      object-fit: contain;
      pointer-events: none;
      transition: opacity 0.15s linear;
    }
    .panel .panel-empty { color: #555; font-size: 1rem; }

    /* Scatter panel — keep the SVG flexible so it fills the available cell. */
    .panel.scatter {
      flex-direction: column;
      align-items: stretch; justify-content: stretch;
      padding: 0.5rem 0.6rem;
    }
    .panel.scatter .scatter-meta {
      display: flex; flex-wrap: wrap; gap: 0.6rem 1.4rem;
      font-size: 0.8rem; padding: 0.1rem 0.2rem 0.4rem 0.2rem;
      color: #d8e1ff;
    }
    .panel.scatter .scatter-meta b {
      font-variant-numeric: tabular-nums;
      color: #6ec4ff; font-weight: 600;
    }
    .panel.scatter svg.scatter-svg {
      flex: 1 1 0; min-height: 0;
      width: 100%;
    }
    .panel.scatter .axis text { font: 10px ui-monospace, monospace; fill: #98a4c8; }
    .panel.scatter .axis line, .panel.scatter .axis path {
      stroke: #2a2a36; fill: none;
    }
    .panel.scatter .gridline { stroke: #1c1c24; stroke-dasharray: 2 3; }
    .panel.scatter .yx { stroke: #555; stroke-dasharray: 4 3; }
    .panel.scatter .point {
      stroke: none;
      fill: rgba(110, 196, 255, 0.55);
    }
    .panel.scatter .axis-label {
      font: 11px ui-monospace, monospace; fill: #d8e1ff; opacity: 0.8;
    }
  </style>
</head>
<body class="viewer">
  <div class="toolbar">
    <label for="sessionSel">session</label>
    <select id="sessionSel"><option>(loading…)</option></select>
    <label for="poseDirSel">pose</label>
    <select id="poseDirSel"></select>
    <label for="modelVersionSel">model</label>
    <select id="modelVersionSel">
      <option value="v2" selected>V2</option>
      <option value="v3">V3</option>
    </select>
    <button id="reloadBtn" class="secondary">Reload</button>

    <fieldset>
      <legend>overlay</legend>
      <label><input type="radio" name="overlay" value="off" checked>off</label>
      <label><input type="radio" name="overlay" value="phone">phone</label>
      <label><input type="radio" name="overlay" value="model">model</label>
      <label><input type="radio" name="overlay" value="diff">diff</label>
      <label><input type="radio" name="overlay" value="blend">blend</label>
    </fieldset>
    <label for="overlayOpacity">opacity</label>
    <input id="overlayOpacity" type="range" min="0" max="1" step="0.05" value="0.6"
           style="width: 100px; vertical-align: middle;">

    <label for="sigmaSlider">σ</label>
    <input id="sigmaSlider" type="range" min="0.005" max="0.15" step="0.005" value="0.03"
           style="width: 120px; vertical-align: middle;"
           title="Gaussian blur sigma as a fraction of the thumbnail diagonal — bigger σ takes more low-frequency content from the phone">
    <span id="sigmaValue" class="stat" style="min-width: 4em;">3.0%</span>

    <span class="spacer"></span>
    <span class="stat" id="stStatus">pick a frame →</span>
  </div>
  <div class="main-row">
    <aside id="thumbsPanel"></aside>
    <div id="content-area">
      <div class="panel image-panel rgb" id="panelRgb">
        <span class="panel-tag">RGB</span>
        <div class="panel-img-wrap">
          <span class="panel-empty">(no frame selected)</span>
        </div>
      </div>
      <div class="panel image-panel" id="panelPhone">
        <span class="panel-tag">phone depth</span>
        <div class="panel-img-wrap">
          <span class="panel-empty">—</span>
        </div>
      </div>
      <div class="panel image-panel" id="panelModel">
        <span class="panel-tag">model depth</span>
        <div class="panel-img-wrap">
          <span class="panel-empty">—</span>
        </div>
      </div>
      <div class="panel image-panel" id="panelBlend">
        <span class="panel-tag">blend</span>
        <div class="panel-img-wrap">
          <span class="panel-empty">—</span>
        </div>
      </div>
      <div class="panel scatter" id="panelScatterModel">
        <span class="panel-tag">phone vs model</span>
        <div class="scatter-meta" id="scatterMetaModel">—</div>
        <svg class="scatter-svg" id="scatterSvgModel" preserveAspectRatio="none"></svg>
      </div>
      <div class="panel scatter" id="panelScatterBlend">
        <span class="panel-tag">phone vs blend</span>
        <div class="scatter-meta" id="scatterMetaBlend">—</div>
        <svg class="scatter-svg" id="scatterSvgBlend" preserveAspectRatio="none"></svg>
      </div>
    </div>
  </div>
  <script type="module" src="./depthscatter.js"></script>
</body>
</html>
