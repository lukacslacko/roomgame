<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Roomgame · Voxel viewer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <link rel="stylesheet" href="styles.css">
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.158.0/examples/jsm/"
    }
  }
  </script>
  <style>
    html, body.viewer { height: 100vh; max-height: 100vh; overflow: hidden; }
    body.viewer { display: flex; flex-direction: column; }
    #stage { flex: 1 1 0; min-height: 0; position: relative; overflow: hidden; }
    #stage canvas { display: block; width: 100% !important; height: 100% !important; }
    .toolbar {
      display: flex; gap: 0.6rem; align-items: center; flex-wrap: wrap;
      padding: 0.6rem 1rem; background: #111; border-bottom: 1px solid #222;
      font-size: 0.9rem;
    }
    .toolbar button {
      background: #2563eb; color: white; border: 0; border-radius: 0.4rem;
      padding: 0.4rem 0.85rem; font-size: 0.9rem; cursor: pointer;
    }
    .toolbar button:disabled { background: #333; cursor: not-allowed; }
    .toolbar .spacer { flex: 1; }
    .toolbar .stat { opacity: 0.75; font-variant-numeric: tabular-nums; }
    .toolbar .stat b { color: #6ec4ff; font-weight: 500; }
    .keys { display: flex; align-items: center; gap: 0.25rem; opacity: 0.85; }
    .keys kbd {
      background: #1f1f24; border: 1px solid #353541; border-bottom-color: #15151b;
      border-radius: 0.25rem; padding: 0.05rem 0.4rem;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 0.78rem; color: #d8e1ff;
    }
    .keys-hint { margin-left: 0.4rem; opacity: 0.6; font-size: 0.82rem; }
    .toolbar select {
      background: #1f1f24; color: #d8e1ff; border: 1px solid #353541;
      border-radius: 0.3rem; padding: 0.25rem 0.4rem; font-size: 0.85rem;
      font-family: inherit;
    }
    .toolbar label { opacity: 0.7; font-size: 0.82rem; }
  </style>
</head>
<body class="viewer">
  <div class="toolbar">
    <label for="sessionSel">session</label>
    <select id="sessionSel"><option>(loading…)</option></select>
    <label for="variantSel">variant</label>
    <select id="variantSel">
      <option value="refined">refined</option>
      <option value="original">original</option>
    </select>
    <button id="reloadBtn">Reload</button>
    <button id="recenterBtn">Recenter</button>
    <button id="lightingBtn" title="Toggle lit / flat shading. Flat = no shadows, no SSAO, raw captured colours">Flat</button>
    <span class="spacer"></span>
    <span class="keys">
      <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd>
      <kbd>Space</kbd>/<kbd>Shift</kbd>
      <span class="keys-hint">move ·</span>
      <kbd>←</kbd><kbd>↑</kbd><kbd>↓</kbd><kbd>→</kbd>
      <span class="keys-hint">or drag to look</span>
    </span>
    <span class="spacer"></span>
    <span class="stat">voxels <b id="stVoxels">—</b></span>
    <span class="stat">size <b id="stSize">—</b></span>
    <span class="stat" id="stMsg">loading…</span>
  </div>
  <div id="stage"></div>
  <script type="module" src="./voxelview.js"></script>
</body>
</html>
