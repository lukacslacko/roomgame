<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Roomgame · Voxel viewer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <link rel="stylesheet" href="styles.css">
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.158.0/examples/jsm/"
    }
  }
  </script>
  <style>
    html, body.viewer { height: 100vh; max-height: 100vh; overflow: hidden; }
    body.viewer { display: flex; flex-direction: column; }
    #stage { flex: 1 1 0; min-height: 0; position: relative; overflow: hidden; }
    #stage canvas { display: block; width: 100% !important; height: 100% !important; }
    .toolbar {
      display: flex; gap: 0.6rem; align-items: center; flex-wrap: wrap;
      padding: 0.6rem 1rem; background: #111; border-bottom: 1px solid #222;
      font-size: 0.9rem;
    }
    .toolbar button {
      background: #2563eb; color: white; border: 0; border-radius: 0.4rem;
      padding: 0.4rem 0.85rem; font-size: 0.9rem; cursor: pointer;
    }
    .toolbar button:disabled { background: #333; cursor: not-allowed; }
    .toolbar .spacer { flex: 1; }
    .toolbar .stat { opacity: 0.75; font-variant-numeric: tabular-nums; }
    .toolbar .stat b { color: #6ec4ff; font-weight: 500; }
    .keys { display: flex; align-items: center; gap: 0.25rem; opacity: 0.85; }
    .keys kbd {
      background: #1f1f24; border: 1px solid #353541; border-bottom-color: #15151b;
      border-radius: 0.25rem; padding: 0.05rem 0.4rem;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 0.78rem; color: #d8e1ff;
    }
    .keys-hint { margin-left: 0.4rem; opacity: 0.6; font-size: 0.82rem; }
    .toolbar select {
      background: #1f1f24; color: #d8e1ff; border: 1px solid #353541;
      border-radius: 0.3rem; padding: 0.25rem 0.4rem; font-size: 0.85rem;
      font-family: inherit;
    }
    .toolbar label { opacity: 0.7; font-size: 0.82rem; }
    .toolbar label.vox-mesh-toggle {
      display: inline-flex; align-items: center; gap: 0.3rem;
      opacity: 0.85; cursor: pointer; user-select: none;
    }
    .toolbar label.vox-mesh-toggle input { margin: 0; }

    /* Frame-debug panel: scrollable thumbnail list on the left.
       Width sized for two ~200 px-wide portrait thumbs side-by-side plus
       a small info column; only ~2 frames fit on a 1080p screen, which
       matches the deliberate "see them well, scroll if needed" goal. */
    .main-row { display: flex; flex-direction: row; flex: 1 1 0; min-height: 0; }
    #framePanel {
      width: 520px; flex: 0 0 520px;
      overflow-y: auto; overflow-x: hidden;
      background: #0c0c10; border-right: 1px solid #222;
      font-size: 0.82rem;
    }
    #framePanel .panel-head {
      display: flex; gap: 0.4rem; align-items: center; flex-wrap: wrap;
      padding: 0.4rem 0.6rem; border-bottom: 1px solid #1c1c24;
      position: sticky; top: 0; background: #0c0c10; z-index: 1;
    }
    #framePanel .panel-head button {
      background: #2563eb; color: white; border: 0; border-radius: 0.3rem;
      padding: 0.2rem 0.55rem; font-size: 0.78rem; cursor: pointer;
    }
    #framePanel .panel-head button.secondary {
      background: #1f1f24; border: 1px solid #353541;
    }
    #framePanel .panel-stat { opacity: 0.6; font-size: 0.78rem; }
    #framePanel .panel-list { padding: 0.2rem 0; }
    .frame-item {
      display: grid;
      grid-template-columns: 6px 80px 1fr 1fr;
      gap: 0.4rem;
      padding: 0.45rem 0.5rem;
      border-bottom: 1px solid #14141a;
      cursor: pointer;
      align-items: stretch;
    }
    .frame-item:hover { background: #14141c; }
    .frame-item.selected { background: #15263f; box-shadow: inset 3px 0 0 #6ec4ff; }
    .frame-item .swatch {
      border-radius: 2px;
      background: transparent;
      align-self: stretch;
    }
    .frame-item.selected .swatch { background: var(--swatch-color, #6ec4ff); }
    .frame-item img {
      width: 100%; height: auto;
      object-fit: contain;
      border-radius: 3px;
      background: #111;
      align-self: start;       /* don't stretch — preserve aspect */
      display: block;
    }
    /* Wrap so we can overlay an SVG with the same `xMidYMid meet` aspect
       behaviour as `object-fit: contain`. The SVG's viewBox matches the
       camera buffer's natural pixel size, so circle markers placed at the
       buffer-native (u·cw, (1−v)·ch) automatically letterbox the same way
       as the underlying PNG. */
    .frame-item .thumb-wrap { position: relative; align-self: start; }
    .frame-item .thumb-wrap svg.kp-overlay {
      position: absolute; left: 0; top: 0;
      width: 100%; height: 100%;
      pointer-events: none;
    }
    .frame-item .thumb-wrap svg.kp-overlay circle {
      fill: none; stroke: #ffe066; stroke-width: 4;
      filter: drop-shadow(0 0 2px rgba(0,0,0,0.95));
    }
    .frame-item .thumb-wrap svg.kp-overlay circle.dot {
      fill: #ffe066; stroke: #111; stroke-width: 1.5;
    }
    .frame-item .info { line-height: 1.3; padding-top: 0.1rem; }
    .frame-item .info .idx { color: #d8e1ff; font-weight: 500; }
    .frame-item .info .pose {
      opacity: 0.75; font-size: 0.72rem; font-variant-numeric: tabular-nums;
      word-break: break-word;
    }
    .frame-item .info .label {
      opacity: 0.5; font-size: 0.7rem; margin-top: 0.4rem;
      text-transform: uppercase; letter-spacing: 0.04em;
    }

    /* Pixel-cloud toolbar (second row, only shown when mode is on). */
    .pc-toolbar {
      display: flex; gap: 0.6rem; align-items: center; flex-wrap: wrap;
      padding: 0.45rem 1rem; background: #161620; border-bottom: 1px solid #222;
      font-size: 0.85rem;
    }
    .pc-toolbar[hidden] { display: none; }
    .pc-toolbar label  { opacity: 0.7; font-size: 0.82rem; }
    .pc-toolbar select {
      background: #1f1f24; color: #d8e1ff; border: 1px solid #353541;
      border-radius: 0.3rem; padding: 0.2rem 0.4rem; font-size: 0.85rem;
      font-family: inherit;
    }
    .pc-toolbar input[type="range"] { width: 160px; }
    .pc-toolbar .pc-val {
      min-width: 3.4rem; text-align: right;
      font-variant-numeric: tabular-nums; color: #6ec4ff;
    }
    .pc-toolbar .pc-status {
      opacity: 0.65; font-size: 0.78rem; margin-left: auto;
    }
    .pc-toolbar button {
      background: #1f1f24; color: #d8e1ff; border: 1px solid #353541;
      border-radius: 0.3rem; padding: 0.2rem 0.55rem; font-size: 0.78rem; cursor: pointer;
    }
    .pc-toolbar button#pcAutotuneBtn,
    .pc-toolbar button#pcAutotuneVoxelBtn,
    .pc-toolbar button#pcAutotuneChamferBtn {
      background: #2563eb; color: white; border: 0; padding: 0.25rem 0.7rem;
      font-weight: 500;
    }
    .pc-toolbar button#pcAutotuneVoxelBtn { background: #6d28d9; }
    .pc-toolbar button#pcAutotuneChamferBtn { background: #0f766e; }
    .pc-toolbar button#pcAutotuneBtn:disabled,
    .pc-toolbar button#pcAutotuneVoxelBtn:disabled,
    .pc-toolbar button#pcAutotuneChamferBtn:disabled {
      background: #333; color: #888; cursor: not-allowed;
    }
    .pc-toolbar label.pc-feat-toggle {
      display: inline-flex; align-items: center; gap: 0.3rem;
      cursor: pointer; user-select: none;
    }
    .pc-toolbar label.pc-feat-toggle input { margin: 0; }
    .pc-group {
      display: flex; align-items: center; gap: 0.35rem;
      padding: 0.05rem 0.45rem; border-left: 1px solid #2a2a36;
    }
    .pc-group:first-child { border-left: 0; }
  </style>
</head>
<body class="viewer">
  <div class="toolbar">
    <label for="sessionSel">session</label>
    <select id="sessionSel"><option>(loading…)</option></select>
    <label for="variantSel">variant</label>
    <select id="variantSel"></select>
    <button id="reloadBtn">Reload</button>
    <button id="recenterBtn">Recenter</button>
    <button id="lightingBtn" title="Toggle lit / flat shading. Flat = no shadows, no SSAO, raw captured colours">Flat</button>
    <label class="vox-mesh-toggle" title="Show / hide the main voxel reconstruction (helpful when comparing pixel-cloud overlays against the baked voxels)">
      <input id="voxMeshToggle" type="checkbox" checked> voxels
    </label>
    <button id="panelToggleBtn" title="Show / hide the per-frame debug panel">Frames ▸</button>
    <button id="pixelCloudBtn" title="Toggle pixel-cloud mode: project each depth pixel of the selected frame(s) to a colored point in 3D">Pixel cloud ▸</button>
    <a href="triplet.html" style="text-decoration:none;"><button title="Open the 3-frame feature explorer for inspecting depth-map correspondence">Triplet editor →</button></a>
    <span class="spacer"></span>
    <span class="keys">
      <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd>
      <kbd>Space</kbd>/<kbd>Shift</kbd>
      <span class="keys-hint">move ·</span>
      <kbd>←</kbd><kbd>↑</kbd><kbd>↓</kbd><kbd>→</kbd>
      <span class="keys-hint">or drag to look</span>
    </span>
    <span class="spacer"></span>
    <span class="stat">voxels <b id="stVoxels">—</b></span>
    <span class="stat">size <b id="stSize">—</b></span>
    <span class="stat" id="stMsg">loading…</span>
  </div>
  <div id="pcToolbar" class="pc-toolbar" hidden>
    <span class="pc-group">
      <label for="pcDepthKindSel">depth</label>
      <select id="pcDepthKindSel">
        <option value="phone">phone (WebXR)</option>
        <option value="model">model</option>
        <option value="blend">blend (phone low + model high, σ=3%)</option>
      </select>
    </span>
    <span class="pc-group" id="pcModelVersionGroup">
      <label for="pcModelVersionSel">model</label>
      <select id="pcModelVersionSel">
        <option value="v2" selected>V2 (Metric Indoor Large)</option>
        <option value="v3">V3 (Depth-Anything-3)</option>
      </select>
    </span>
    <span class="pc-group">
      <label for="pcPoseDirSel">pose</label>
      <select id="pcPoseDirSel"></select>
    </span>
    <span class="pc-group">
      <label for="pcStrideSel">stride</label>
      <select id="pcStrideSel">
        <option value="1">1</option>
        <option value="2">2</option>
        <option value="4" selected>4</option>
        <option value="8">8</option>
        <option value="16">16</option>
      </select>
    </span>
    <span class="pc-group" id="pcAffineGroup">
      <label for="pcASlider">a</label>
      <input id="pcASlider" type="range" min="0" max="3" step="0.005" value="1.0">
      <span class="pc-val" id="pcAVal">1.000</span>
      <label for="pcBSlider">b</label>
      <input id="pcBSlider" type="range" min="-2" max="2" step="0.005" value="0.0">
      <span class="pc-val" id="pcBVal">+0.000</span>
      <label for="pcFitSpaceSel">space</label>
      <select id="pcFitSpaceSel">
        <option value="depth">depth</option>
        <option value="disparity" selected>disparity (1/d)</option>
      </select>
      <button id="pcResetBtn" title="Reset all selected frames to a=1, b=0">reset</button>
    </span>
    <span class="pc-group">
      <button id="pcAutotuneBtn" title="Fit (a, b) per selected frame so the cached model_raw at each common BA-feature pixel matches the BA-triangulated world point's camera-Z. Persists per-frame.">auto-tune (features)</button>
      <button id="pcAutotuneVoxelBtn" title="Feature-free: maximise pairwise voxel-overlap count between selected frames (≥2). Coarse-to-fine voxel sizes (30 → 15 → 5 cm) with Powell. Slow first run, ~1–3 s with 2 frames.">auto-tune (voxel)</button>
      <button id="pcAutotuneChamferBtn" title="Feature-free smooth surrogate: minimise pairwise truncated-Chamfer distance (NN-distance squared, clipped at the threshold) between selected frames. Coarse-to-fine thresholds (30 → 5 cm) with Powell. Best when warm-started from auto-tune (features) — cold-starts can fall into a 'collapse to camera' basin.">auto-tune (chamfer)</button>
      <label class="pc-feat-toggle" title="Show common BA features as cyan markers in 3D and as overlays on the per-frame thumbnails">
        <input id="pcFeaturesToggle" type="checkbox" checked> features
      </label>
    </span>
    <span class="pc-status" id="pcStatus">—</span>
  </div>
  <div class="main-row">
    <aside id="framePanel" hidden>
      <div class="panel-head">
        <span class="panel-stat" id="framePanelCount">0 frames</span>
        <span class="spacer" style="flex: 1"></span>
        <button id="panelClearBtn" class="secondary" title="Deselect all">clear</button>
      </div>
      <div class="panel-list" id="framePanelList"></div>
    </aside>
    <div id="stage"></div>
  </div>
  <script type="module" src="./voxelview.js"></script>
</body>
</html>
